<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sports Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>Intramurals Registration</h1>

    <div class="form-wrapper">

        <!-- SPORTS SECTION -->
        <div class="form-box">

            <h2>Sports Registration</h2>

            <form>

                <input type="text" placeholder="Student Name" required>

                <select required>
                    <option>Basketball</option>
                    <option>Volleyball</option>
                    <option>Badminton</option>
                    <option>Pickleball</option>
                    <option>Table Tennis</option>
                    <option>Sepak Takraw</option>
                    <option>Chess</option>
                    <option>Track & Field</option>
                </select>

                <select required>
                    <option>Boys</option>
                    <option>Girls</option>
                    <option>Single</option>
                    <option>Double</option>
                </select>

                <input type="text" placeholder="Team Name" required>

                <button type="submit" class="btn">
                    Submit Sports Registration
                </button>

            </form>

        </div>

        <!-- E-GAMES SECTION -->
        <div class="form-box">

            <h2>E-Games Registration</h2>

            <form>

                <input type="text" placeholder="Student Name" required>

                <select required>
                    <option>CODM</option>
                    <option>Mobile Legends</option>
                </select>

                <select required>
                    <option>Boys</option>
                    <option>Girls</option>
                </select>

                <input type="text" placeholder="Team Name" required>

                <button type="submit" class="btn">
                    Submit E-Games Registration
                </button>

            </form>

        </div>

    </div>

</div>

<script src="js/student.js"></script>

</body>
</html>
