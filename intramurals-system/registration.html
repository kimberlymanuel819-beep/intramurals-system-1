<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sports Registration</title>
    <link rel="stylesheet" href="css/registration.css">
</head>

<body>

<div class="container">

    <h1>Intramurals Registration</h1>

    <div class="form-wrapper">

        <!-- SPORTS SECTION -->
        <div class="form-box">

            <h2>Sports Registration</h2>

            <form id="sportsForm">

                <input id="sports_student_name" name="student_name" type="text" placeholder="Student Name" required>
                <input id="sports_student_number" name="student_number" type="text" placeholder="Student Number" required>

                <select id="sport" required>
                    <option value="">Select Sport</option>
                    <option value="Basketball">Basketball</option>
                    <option value="Volleyball">Volleyball</option>
                    <option value="Badminton">Badminton</option>
                    <option value="Pickleball">Pickleball</option>
                    <option value="Table Tennis">Table Tennis</option>
                    <option value="Sepak Takraw">Sepak Takraw</option>
                    <option value="Chess">Chess</option>
                    <option value="Track & Field">Track & Field</option>
                </select>

                <select id="sports_division" name="division" required>
                    <option value="">Select division</option>
                    <option value="Boys">Boys</option>
                    <option value="Girls">Girls</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                </select>

                <input id="sports_team_name" name="team_name" type="text" placeholder="Team Name (optional)">

                <input id="sports_course_year" name="course_year" type="text" placeholder="Course/Year (optional)">
                    
                <button type="submit" class="btn">
                    Submit Sports Registration
                </button>

            </form>

        </div>

        <!-- E-GAMES SECTION -->
        <div class="form-box">

            <h2>E-Games Registration</h2>

            <form id="egamesForm">

                <input id="egames_student_name" name="student_name" type="text" placeholder="Student Name" required>
                <input id="egames_student_number" name="student_number" type="text" placeholder="Student Number" required>

                <select id="egames_select" name="sport_id" required>
                    <option value="">Select E-Games</option>
                    <option value="CODM">CODM</option>
                    <option value="Mobile Legends">Mobile Legends</option>
                    <option value="Wild Rift">Wild Rift</option>
                </select>

                <select id="egames_division" name="division" required>
                    <option value="">Select division</option>
                    <option>Boys</option>
                    <option>Girls</option>
                </select>

                <input id="egames_team_name" name="team_name" type="text" placeholder="Team Name (optional)">

                <button type="submit" class="btn">
                    Submit E-Games Registration
                </button>

            </form>

        </div>

    </div>

</div>

<script src="js/student.js"></script>

</body>
</html>
